# Assume que os repositórios financeiro-encontro-api e financeiro-encontro-web
# estão clonados como pastas irmãs deste repositório (infra-encontro):
#
#   SISTEMA_ENCONTRO/
#   ├── financeiro-encontro-api/
#   ├── financeiro-encontro-web/
#   └── infra-encontro/   <- você está aqui

services:
  postgres:
    image: postgres:15
    container_name: financeiro_encontro_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../financeiro-encontro-api
    container_name: financeiro_encontro_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      UPLOAD_FOLDER: ${UPLOAD_FOLDER:-/app/uploads}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      APP_PORT: ${APP_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    volumes:
      - uploads_data:${UPLOAD_FOLDER:-/app/uploads}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"

  frontend:
    build:
      context: ../financeiro-encontro-web
      args:
        API_URL: ${API_URL:-http://localhost:8000}
    container_name: financeiro_encontro_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
